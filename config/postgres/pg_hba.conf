# config/postgres/pg_hba.conf
#
# Host-Based Authentication — controls WHO can connect, FROM WHERE, and HOW.
#
# ── HOW PostgreSQL READS THIS FILE ────────────────────────────────────────────
#
# Rules are evaluated TOP TO BOTTOM. The FIRST matching rule wins.
# If no rule matches: connection is REJECTED with "no pg_hba.conf entry" error.
# This error looks like an auth failure but happens BEFORE auth is attempted.
#
# ── COLUMNS ───────────────────────────────────────────────────────────────────
#
# TYPE      CONNECTION TYPE
#   local   → Unix domain socket (psql from inside the container, no TCP)
#   host    → TCP/IP connection (any — IPv4 or IPv6)
#   hostssl → TCP/IP, TLS required
#   hostnossl → TCP/IP, TLS forbidden
#
# DATABASE  WHICH DATABASE
#   all         → any real database
#   replication → special keyword for WAL streaming connections (NOT a real DB)
#                 Debezium's WAL connection uses this pseudo-database.
#                 "all" does NOT include replication — must be explicit.
#   mydb        → specific database name
#
# USER      WHICH POSTGRESQL USER
#   all     → any user
#   debezium → specific user
#
# ADDRESS   CLIENT IP RANGE (CIDR notation)
#   For 'local' type: no address column (Unix sockets have no IP)
#   For 'host' type: IPv4 or IPv6 CIDR range
#
# METHOD    HOW TO AUTHENTICATE
#   trust       → no password, accept blindly. ONLY safe for local/loopback.
#   scram-sha-256 → challenge-response, password never sent in cleartext. Recommended.
#   md5         → older hash method. Avoid in new setups (use scram-sha-256).
#   reject      → always reject. Useful to block specific users/hosts explicitly.
#
# FORMAT:
# TYPE    DATABASE        USER            ADDRESS             METHOD

# ── 1. Unix socket connections ────────────────────────────────────────────────
# Used by: psql from inside the container, initdb scripts, pg_dump locally.
# Unix sockets are only accessible from within the same container.
# Trust is safe here — only processes inside the container can use Unix sockets.
# This rule allows our init.sql scripts to run (they connect via Unix socket).
local   all             all                                     trust

# ── 2. Loopback TCP (IPv4) ────────────────────────────────────────────────────
# Used by: health checks, processes inside the container connecting to 127.0.0.1
# scram-sha-256: requires correct username + password even from localhost.
host    all             all             127.0.0.1/32            scram-sha-256

# ── 3. Loopback TCP (IPv6) ────────────────────────────────────────────────────
# Same as above but for IPv6 loopback (::1).
# Some tools use IPv6 by default. Cover both to avoid "connection refused".
host    all             all             ::1/128                 scram-sha-256

# ── 4. Docker bridge network — regular application connections ─────────────────
# Used by: simulate.py, consumer.py, any app container on cdc-network.
# 172.16.0.0/12 covers ALL Docker bridge network ranges:
#   172.17.0.0/16 → docker0 (default bridge)
#   172.18.0.0/16 → cdc-network (our named bridge)
#   ... up to 172.31.0.0/16
# We use /12 so this rule works regardless of which /16 Docker assigns.
host    all             all             172.16.0.0/12           scram-sha-256

# ── 5. Debezium replication connection ────────────────────────────────────────
# Used by: ONLY Debezium, for WAL streaming (logical replication protocol).
#
# WHY THIS RULE MUST EXIST SEPARATELY:
#   Debezium makes TWO types of connections to PostgreSQL:
#     a) Regular SQL connection (for initial snapshot): covered by rule 4 above.
#     b) Replication connection (for WAL streaming): DATABASE = 'replication'.
#
#   The 'replication' pseudo-database is NOT matched by DATABASE = 'all'.
#   Rule 4 above has DATABASE = all → does NOT match replication connections.
#   Without THIS rule, Debezium's WAL connection fails with:
#     "no pg_hba.conf entry for host '172.18.0.4', user 'debezium',
#      database 'replication', SSL off"
#   Even though the credentials are correct — rejection happens before auth.
#
# We restrict this to the 'debezium' user only (not 'all') — least privilege.
# Only the designated replication user should make replication connections.
host    replication     debezium        172.16.0.0/12           scram-sha-256

# ── 6. Host machine access ────────────────────────────────────────────────────
# Used by: your laptop's psql, DBeaver, TablePlus, simulate.py run directly.
# When you do -p 5432:5432, your host machine connects to the container.
# From the container's perspective, the source IP is the Docker gateway
# (typically 172.17.0.1 or 172.18.0.1) — already covered by rule 4.
#
# BUT: if you use host networking or the IP falls outside 172.16.0.0/12,
# 0.0.0.0/0 catches it. This is broad — acceptable for local development.
# In production: replace with your specific office/VPN IP range.
host    all             all             0.0.0.0/0               scram-sha-256