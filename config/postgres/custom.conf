# config/postgres/custom.conf
#
# Loaded by postgresql.conf via: include_if_exists = '/etc/postgresql/custom.conf'
# Applied on every PostgreSQL startup (not just first-time init).
# Change a value here → docker restart cdc-postgres (no rebuild needed).
#
# Settings are grouped by purpose. Each section explains WHY the setting
# exists for CDC, not just what it does.

# ════════════════════════════════════════════════════════════════════════
# 1. WAL LEVEL — the most critical setting for CDC
# ════════════════════════════════════════════════════════════════════════
#
# PostgreSQL writes every committed change to the WAL before touching
# actual table files. The WAL level controls HOW MUCH information is written.
#
#   minimal  → just enough for crash recovery. No replication possible.
#   replica  → DEFAULT. Enough for physical streaming replication.
#              WAL entries are binary page diffs: "page 4892, offset 128, bytes: 0x3F..."
#              No row-level information. Debezium CANNOT use this.
#   logical  → everything in replica PLUS:
#              - which table changed
#              - full before-image of the row (old values)
#              - full after-image of the row (new values)
#              - transaction boundaries (BEGIN/COMMIT)
#              - column identity information
#              Debezium reads this via the pgoutput logical decoding plugin.
#
# Cost of logical vs replica:
#   An UPDATE with logical writes ~10x more WAL data (full row, not just diff).
#   At 10k writes/sec this is measurable. For our CDC use case, it's required.

wal_level = logical

# ════════════════════════════════════════════════════════════════════════
# 2. REPLICATION SLOTS
# ════════════════════════════════════════════════════════════════════════
#
# A replication slot is a persistent named cursor in the WAL stream.
# It tracks how far a consumer (Debezium) has read and tells PostgreSQL:
# "don't delete WAL segments until I've confirmed reading past them."
#
# Each independent WAL consumer needs its own slot.
# Debezium creates one slot automatically (named 'debezium_slot' per connector config).
#
# max_replication_slots = how many slots can exist simultaneously.
# Formula for this setup:
#   1 (Debezium) + 0 (no physical standbys) + 2 (buffer for testing) = 3 minimum
#   We set 5 for comfortable headroom.
#
# DANGER: abandoned slots (slot exists but consumer is offline) cause
# PostgreSQL to accumulate WAL indefinitely. Disk fills → PostgreSQL crashes.
# Always monitor: SELECT slot_name, pg_size_pretty(
#   pg_wal_lsn_diff(pg_current_wal_lsn(), confirmed_flush_lsn)) AS lag
# FROM pg_replication_slots;

max_replication_slots = 5

# ════════════════════════════════════════════════════════════════════════
# 3. WAL SENDERS
# ════════════════════════════════════════════════════════════════════════
#
# A WAL sender is a PostgreSQL backend process dedicated to streaming WAL
# to a consumer. One sender is created per active replication connection.
#
# Each connected Debezium task = 1 WAL sender.
# Each physical standby replica = 1 WAL sender.
# pg_basebackup (backup tool) = 1 WAL sender.
#
# max_wal_senders must be >= max_replication_slots (active slots need senders).
# We add +1 over max_replication_slots as a reserve for admin connections.

max_wal_senders = 5

# ════════════════════════════════════════════════════════════════════════
# 4. WAL KEEP SIZE — local WAL buffer (belt and suspenders)
# ════════════════════════════════════════════════════════════════════════
#
# max_slot_wal_keep_size protects against disk exhaustion (Debezium offline).
# wal_keep_size is a different, complementary setting:
#   Keep at least this much WAL on disk even WITHOUT a slot requiring it.
#   Acts as a rolling buffer so a consumer that briefly falls behind
#   can catch up without needing a slot to hold segments.
#
# 256MB = keeps roughly the last few minutes of WAL available.
# This is in addition to whatever slots require.
# Not strictly necessary with slots, but adds safety margin for brief outages.

wal_keep_size = 256MB

# ════════════════════════════════════════════════════════════════════════
# 5. WAL SLOT DISK CAP — emergency protection against runaway WAL
# ════════════════════════════════════════════════════════════════════════
#
# If Debezium goes offline for an extended period, PostgreSQL cannot
# delete WAL segments the slot hasn't confirmed reading.
# Without a cap, this fills up the entire disk and crashes PostgreSQL.
#
# max_slot_wal_keep_size: hard cap on how much WAL any single slot can retain.
# When the cap is hit, PostgreSQL INVALIDATES the slot (marks it as unusable)
# rather than running out of disk.
#
# An invalidated slot means Debezium must re-snapshot from scratch on reconnect.
# That's painful but recoverable. A full disk is a production outage.
#
# 2GB is reasonable for development. Production typically uses 10-50GB.
# Monitor lag with: SELECT ... pg_size_pretty(...) FROM pg_replication_slots;

max_slot_wal_keep_size = 2GB

# ════════════════════════════════════════════════════════════════════════
# 6. pg_hba.conf LOCATION
# ════════════════════════════════════════════════════════════════════════
#
# PostgreSQL's host-based authentication file controls:
#   - WHO can connect (which users)
#   - FROM WHERE (which IPs/networks)
#   - TO WHAT (which databases, including the special 'replication' pseudo-database)
#   - HOW they authenticate (trust, scram-sha-256, md5, etc.)
#
# The default pg_hba.conf location is inside PGDATA (/var/lib/postgresql/data/).
# The postgres Docker image generates a default pg_hba.conf at initdb time.
# We override hba_file to point to OUR copy at /etc/postgresql/pg_hba.conf
# so our rules are used regardless of what initdb generates.
#
# Why not just overwrite PGDATA/pg_hba.conf?
#   PGDATA is created at first startup, not at build time. We can't COPY
#   files there in the Dockerfile. We could use an init script but that
#   runs only once — our /etc/postgresql/pg_hba.conf persists across rebuilds.

hba_file = '/etc/postgresql/pg_hba.conf'

# ════════════════════════════════════════════════════════════════════════
# 7. REPLICATION LOGGING — essential for CDC debugging
# ════════════════════════════════════════════════════════════════════════
#
# Logs a line every time a replication connection starts or stops.
# Without this: you have no visibility into whether Debezium is actually
# connected, or when it disconnects and reconnects.
#
# With this in the logs, you'll see:
#   LOG:  starting logical decoding for slot "debezium_slot"
#   LOG:  replication slot "debezium_slot" stopped streaming
#
# Essential for debugging CDC connectivity issues.

log_replication_commands = on

# ════════════════════════════════════════════════════════════════════════
# 8. CHECKPOINT SETTINGS — WAL write performance
# ════════════════════════════════════════════════════════════════════════
#
# Checkpoints write dirty pages from memory to disk and create a safe
# recovery point in the WAL. Frequent checkpoints = more WAL I/O.
# With logical replication, we want checkpoints to not interfere with
# Debezium's WAL streaming.
#
# checkpoint_timeout: how often a checkpoint is triggered by time.
#   Default 5min. 10min reduces checkpoint frequency and I/O spikes.
#
# checkpoint_completion_target: how much of the checkpoint_timeout period
#   to spread the checkpoint I/O across. 0.9 = spread over 90% of the
#   interval → smoother I/O, less impact on concurrent WAL writes.

checkpoint_timeout = 10min
checkpoint_completion_target = 0.9

# ════════════════════════════════════════════════════════════════════════
# 9. LOGGING — visibility into PostgreSQL internals
# ════════════════════════════════════════════════════════════════════════
#
# log_min_duration_statement: log any query taking longer than N ms.
# 1000 = log queries over 1 second. Useful for finding slow CDC-related queries.
# Set to -1 to disable, 0 to log everything (very verbose).
#
# log_line_prefix: what to prepend to each log line.
#   %t = timestamp, %u = username, %d = database name, %p = process ID
#   This makes logs parseable and correlatable with pg_stat_activity.

log_min_duration_statement = 1000
log_line_prefix = '%t [%p] %u@%d '